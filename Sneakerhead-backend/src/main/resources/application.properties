spring.application.name=sneakerhead-backend

# ─────────────────────────────────────────────────────────────────────────────
# MySQL — Vendor / Seller accounts (relational, structured data)
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/sneakerhead_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─────────────────────────────────────────────────────────────────────────────
# MongoDB — Shoe product listings (flexible schema, rich documents)
# ─────────────────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb+srv://abhishek:abhishek@cluster0.v7q8a.mongodb.net/sneakerhead_products?retryWrites=true&w=majority
spring.data.mongodb.auto-index-creation=false

# ─────────────────────────────────────────────────────────────────────────────
# Redis — Session cache + hot product listing cache
# ─────────────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=500ms
spring.data.redis.connect-timeout=500ms

# Cache TTL defaults (seconds)
spring.cache.redis.time-to-live=300

# ─────────────────────────────────────────────────────────────────────────────
# Spring Session — store vendor sessions in Redis
# ─────────────────────────────────────────────────────────────────────────────
# Set to 'redis' when Redis is available; 'none' for local dev without Redis
spring.session.store-type=none
spring.session.timeout=1800s

# ─────────────────────────────────────────────────────────────────────────────
# JWT
# ─────────────────────────────────────────────────────────────────────────────
jwt.secret=sneakerhead-super-secret-key-change-in-production-must-be-256-bits!!
jwt.expiration-ms=86400000

# ─────────────────────────────────────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────────────────────────────────────
server.port=8080
